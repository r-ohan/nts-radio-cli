name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-14
            archive: nts-macos-aarch64.tar.gz
          - name: macos-x86_64
            runner: macos-13
            archive: nts-macos-x86_64.tar.gz
          - name: linux-x86_64
            runner: ubuntu-latest
            archive: nts-linux-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: tar -czf ${{ matrix.archive }} -C target/release nts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
